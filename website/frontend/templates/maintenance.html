<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - Nexus</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f14;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 480px;
        }
        .logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            margin: 0 auto 24px;
        }
        .icon-wrap {
            width: 72px;
            height: 72px;
            background: rgba(99,102,241,0.12);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #64748b;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .badge {
            display: inline-block;
            background: rgba(245,158,11,0.15);
            color: #fbbf24;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrap">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
                <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
            </svg>
        </div>
        <div class="badge"><span class="status-dot"></span>Under Maintenance</div>
        <h1>Back soon</h1>
        <p>Nexus is currently down for scheduled maintenance. Things will be back to normal shortly.</p>
        <p style="font-size:14px;color:#475569;">If you need to reach us, join the Discord server.</p>
    </div>
</body>
</html>
